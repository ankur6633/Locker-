name: emilocker
description: "Production-grade EMI Locker application with enterprise-level architecture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # Firebase
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # Security
  flutter_secure_storage: ^9.0.0
  
  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  get_it: ^7.6.4
  
  # UI
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  mobile_scanner: ^5.2.3
  
  cupertino_icons: ^1.0.8
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  freezed: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
